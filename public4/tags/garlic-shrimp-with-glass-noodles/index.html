                globe.className = 'gt-globe';

                globe.style.cssText = 'display:none';
                btn.insertBefore(globe, btn.firstChild);
            }
            const sel = document.querySelector('.goog-te-combo');
            if (sel && !sel._listener) {
                sel._listener = true;
                sel.addEventListener('change', function() {
                    if (this.value) localStorage.setItem('gt_lang_override', this.value);
                });
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    });
