baseURL = 'https://greatchinesefood.online/'
locale = 'en'
title = 'Great Chinese Food'
defaultContentLanguage = 'en'
enableRobotsTXT = true

[params]
  description = 'Real Chinese home cooking recipes — from our kitchen to yours'

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  page = ['HTML']

[rss]
  limit = 100
